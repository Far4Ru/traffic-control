<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Управление перекрестком | RAG Traffic Control</title>
  <style>
    /* Дополнительные стили для адаптивности */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    #app {
      display: flex;
      height: 100%;
      width: 100%;
    }

    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #16213e;
      overflow: hidden;
      position: relative;
    }

    #scene-canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    #control-panel {
      width: 350px;
      background: #0f3460;
      padding: 20px;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: transform 0.3s ease;
      -webkit-overflow-scrolling: touch;
    }

    .control-section {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 15px;
      flex-shrink: 0;
    }

    .control-section h3 {
      margin-bottom: 10px;
      color: #e94560;
      font-size: 16px;
      font-weight: 500;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stat-item {
      background: #0f3460;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #aaa;
    }

    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #00d2ff;
    }

    .prompt-input {
      width: 100%;
      padding: 10px;
      background: #0f3460;
      border: 1px solid #e94560;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
      resize: vertical;
      min-height: 80px;
    }

    .prompt-input:focus {
      outline: none;
      border-color: #00d2ff;
    }

    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #e94560;
      color: white;
    }

    .btn-primary:hover {
      background: #ff6b6b;
    }

    .btn-secondary {
      background: #0f3460;
      color: #00d2ff;
      border: 1px solid #00d2ff;
    }

    .btn-secondary:hover {
      background: #1a4a7a;
    }

    .template-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .template-btn {
      background: #0f3460;
      color: #ccc;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
      font-size: 12px;
      transition: all 0.2s;
    }

    .template-btn:hover {
      background: #1a4a7a;
      color: #fff;
    }

    .rag-status {
      margin-top: 10px;
      padding: 8px;
      background: #0f3460;
      border-radius: 4px;
      font-size: 12px;
      color: #00d2ff;
      line-height: 1.5;
    }

    /* Адаптивность для планшетов */
    @media (max-width: 1024px) {
      #control-panel {
        width: 300px;
        padding: 15px;
        gap: 15px;
      }
      
      .control-section h3 {
        font-size: 14px;
      }
      
      .stat-value {
        font-size: 16px;
      }
    }

    /* Адаптивность для мобильных устройств - вертикальная прокрутка */
    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }
      
      #canvas-container {
        flex: 1;
        min-height: 40%;
        max-height: 50%;
      }
      
      #control-panel {
        width: 100%;
        flex: 1;
        flex-direction: column;
        padding: 12px;
        gap: 10px;
        max-height: 60%;
        overflow-y: auto;
        overflow-x: hidden;
      }
      
      .control-section {
        width: 100%;
        padding: 12px;
        margin-bottom: 0;
      }
      
      .stat-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      
      .stat-item {
        padding: 8px 4px;
      }
      
      .stat-value {
        font-size: 16px;
      }
      
      .stat-label {
        font-size: 10px;
      }
      
      .prompt-input {
        min-height: 70px;
        font-size: 14px;
        padding: 10px;
      }
      
      .btn {
        padding: 10px 12px;
        font-size: 14px;
      }
      
      .template-btn {
        padding: 8px;
        font-size: 12px;
      }
      
      .rag-status {
        font-size: 11px;
      }
    }

    /* Для маленьких телефонов */
    @media (max-width: 480px) {
      #canvas-container {
        min-height: 35%;
        max-height: 45%;
      }
      
      #control-panel {
        padding: 10px;
        gap: 8px;
        max-height: 65%;
      }
      
      .control-section {
        padding: 10px;
      }
      
      .control-section h3 {
        font-size: 13px;
        margin-bottom: 8px;
      }
      
      .stat-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }
      
      .stat-item {
        padding: 6px 3px;
      }
      
      .stat-value {
        font-size: 14px;
      }
      
      .stat-label {
        font-size: 9px;
      }
      
      .prompt-input {
        min-height: 60px;
        font-size: 13px;
        padding: 8px;
      }
      
      .btn {
        padding: 8px 10px;
        font-size: 13px;
      }
      
      .template-btn {
        padding: 6px;
        font-size: 11px;
      }
      
      .rag-status {
        font-size: 10px;
        padding: 6px;
      }
    }

    /* Для очень высоких экранов */
    @media (min-height: 800px) and (max-width: 768px) {
      #canvas-container {
        max-height: 40%;
      }
      
      #control-panel {
        max-height: 60%;
      }
    }

    /* Альбомная ориентация на мобильных */
    @media (max-width: 900px) and (orientation: landscape) {
      #app {
        flex-direction: row;
      }
      
      #canvas-container {
        flex: 1;
        max-height: 100%;
        min-height: 100%;
      }
      
      #control-panel {
        width: 280px;
        max-height: 100%;
        flex-direction: column;
        padding: 10px;
        gap: 8px;
      }
      
      .control-section {
        padding: 8px;
      }
      
      .stat-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .stat-value {
        font-size: 14px;
      }
      
      .prompt-input {
        min-height: 50px;
        font-size: 12px;
      }
      
      .template-list {
        max-height: 150px;
        overflow-y: auto;
      }
    }

    /* Кастомный скроллбар для панели управления */
    #control-panel::-webkit-scrollbar {
      width: 6px;
    }
    
    #control-panel::-webkit-scrollbar-track {
      background: #0f3460;
      border-radius: 3px;
    }
    
    #control-panel::-webkit-scrollbar-thumb {
      background: #e94560;
      border-radius: 3px;
    }
    
    #control-panel::-webkit-scrollbar-thumb:hover {
      background: #ff6b6b;
    }

    /* Для Firefox */
    #control-panel {
      scrollbar-width: thin;
      scrollbar-color: #e94560 #0f3460;
    }

    /* Анимация для панели при изменении размера */
    .control-section {
      transition: all 0.2s ease;
    }
  </style>

  <div id="app">
    <div id="canvas-container">
      <canvas id="scene-canvas"></canvas>
